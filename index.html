<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .progress { height: 25px; border-radius: 12px; background-color: #e9ecef; }
        .slot-btn { font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        .stock-low { color: #dc3545; font-weight: bold; }
        .med-card { border-left: 5px solid #0d6efd; transition: 0.2s; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4 fw-bold text-primary">MediTrack Schedule</h2>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h5 class="mb-3">Add Medicine</h5>
                <form id="medForm">
                    <div class="mb-3"><label class="small">Name</label><input type="text" id="name" class="form-control" required></div>
                    <div class="mb-3"><label class="small">Dosage</label><input type="text" id="dosage" class="form-control" placeholder="e.g. 1 pill"></div>
                    <div class="mb-3"><label class="small">Stock</label><input type="number" id="stock" class="form-control" value="20"></div>
                    
                    <label class="small d-block mb-2">Daily Slots</label>
                    <div class="mb-3 border p-2 rounded">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="m-check" checked>
                            <label class="form-check-label small">Morning</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="n-check">
                            <label class="form-check-label small">Noon</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="e-check">
                            <label class="form-check-label small">Night</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <select id="food" class="form-select"><option>Before Food</option><option>After Food</option></select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add to Schedule</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4 mb-4">
                <h6 class="small fw-bold text-muted text-uppercase">Daily Completion Phase</h6>
                <div class="progress d-flex">
                    <div id="bar-morning" class="progress-bar bg-warning text-dark border-end border-white" style="width: 33.3%; opacity: 0.2;">Morning</div>
                    <div id="bar-noon" class="progress-bar bg-info text-dark border-end border-white" style="width: 33.3%; opacity: 0.2;">Noon</div>
                    <div id="bar-evening" class="progress-bar bg-primary border-end border-white" style="width: 33.4%; opacity: 0.2;">Night</div>
                </div>
            </div>
            <div id="medList" class="row g-3"></div>
        </div>
    </div>
</div>

<script>
    const API = "https://medtrak.onrender.com/medicines";

    async function loadMeds() {
        try {
            const res = await fetch(API);
            const meds = await res.json();
            const container = document.getElementById('medList');
            let mTotal = 0, mDone = 0, nTotal = 0, nDone = 0, eTotal = 0, eDone = 0;

            container.innerHTML = meds.length === 0 ? '<p class="text-center text-muted">No medicines added.</p>' : '';

            meds.forEach(m => {
                if(m.slots.morning.required) { mTotal++; if(m.slots.morning.taken) mDone++; }
                if(m.slots.noon.required) { nTotal++; if(m.slots.noon.taken) nDone++; }
                if(m.slots.evening.required) { eTotal++; if(m.slots.evening.taken) eDone++; }

                const low = m.stock <= 5 ? 'stock-low' : '';
                container.innerHTML += `
                    <div class="col-sm-6">
                        <div class="card p-3 med-card">
                            <h6 class="fw-bold mb-1">${m.name}</h6>
                            <div class="small text-muted mb-2">${m.dosage} | ${m.food}</div>
                            <div class="small mb-3">Stock: <span class="${low}">${m.stock}</span></div>
                            <div class="row g-1">
                                ${m.slots.morning.required ? `<div class="col"><button onclick="take(${m.id}, 'morning')" class="btn w-100 slot-btn ${m.slots.morning.taken ? 'btn-success' : 'btn-outline-warning'}" ${m.slots.morning.taken ? 'disabled' : ''}>MOR</button></div>` : ''}
                                ${m.slots.noon.required ? `<div class="col"><button onclick="take(${m.id}, 'noon')" class="btn w-100 slot-btn ${m.slots.noon.taken ? 'btn-success' : 'btn-outline-info'}" ${m.slots.noon.taken ? 'disabled' : ''}>NOON</button></div>` : ''}
                                ${m.slots.evening.required ? `<div class="col"><button onclick="take(${m.id}, 'evening')" class="btn w-100 slot-btn ${m.slots.evening.taken ? 'btn-success' : 'btn-outline-primary'}" ${m.slots.evening.taken ? 'disabled' : ''}>EVE</button></div>` : ''}
                            </div>
                            <div class="d-flex justify-content-between mt-3">
                                <button onclick="refill(${m.id})" class="btn btn-sm btn-link p-0 text-decoration-none">Refill</button>
                                <button onclick="deleteMed(${m.id})" class="btn btn-sm btn-link p-0 text-danger text-decoration-none">Delete</button>
                            </div>
                        </div>
                    </div>`;
            });

            updateBar('bar-morning', mDone, mTotal);
            updateBar('bar-noon', nDone, nTotal);
            updateBar('bar-evening', eDone, eTotal);
        } catch (err) { console.error("Load Error:", err); }
    }

    function updateBar(id, done, total) {
        const el = document.getElementById(id);
        const percent = total > 0 ? (done / total) * 100 : 0;
        el.style.opacity = (total > 0 && percent === 100) ? "1" : "0.2";
        el.innerHTML = percent === 100 ? `✅ ${id.split('-')[1]}` : id.split('-')[1];
    }

    document.getElementById('medForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('name').value,
            dosage: document.getElementById('dosage').value,
            stock: parseInt(document.getElementById('stock').value),
            food: document.getElementById('food').value,
            slots: {
                morning: document.getElementById('m-check').checked,
                noon: document.getElementById('n-check').checked,
                evening: document.getElementById('e-check').checked
            }
        };
        await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        document.getElementById('medForm').reset();
        loadMeds();
    };

    async function take(id, slot) {
        const res = await fetch(`${API}/${id}/take/${slot}`, { method: 'POST' });
        if(!res.ok) alert("Out of stock!");
        loadMeds();
    }

    async function refill(id) {
        const amt = prompt("How many tablets to add?");
        if (!amt) return;
        await fetch(`${API}/${id}/refill`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ amount: parseInt(amt) }) });
        loadMeds();
    }

    async function deleteMed(id) {
        if(confirm("Remove medicine?")) {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            loadMeds();
        }
    }

    // New day auto-refresh logic
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") { loadMeds(); }
    });

    loadMeds();
</script>
</body>
</html>
